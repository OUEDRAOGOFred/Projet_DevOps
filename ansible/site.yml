---
- name: DevSecOps Configuration & Hardening
  hosts: all
  become: yes
  roles:
    - security-hardening

- name: Kubernetes Initial Configuration (Namespaces, RBAC, Secrets)
  hosts: localhost # S'exécute localement ou sur le runner CI, communiquant avec l'API K8s
  connection: local
  roles:
    - k8s-config
