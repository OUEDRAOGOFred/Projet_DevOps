[cce_nodes]
# L'inventaire dynamique ou statique des noeuds. 
# En production cloud, on utilise souvent un Dynamic Inventory plugin (ex: huaweicloud inventory)
# Exemple statique pour bastion ou VMs spécifiques :
node-1 ansible_host=10.0.1.10
node-2 ansible_host=10.0.1.11

[all:vars]
ansible_user=appadmin
ansible_ssh_private_key_file=~/.ssh/id_rsa
