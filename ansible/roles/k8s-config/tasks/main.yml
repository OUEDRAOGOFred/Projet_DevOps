---
# Tâches de configuration initiale du cluster Kubernetes (via l'API Kubernetes)
# Idéal pour initialiser l'environnement avant les déploiements de CI/CD (Jenkins/ArgoCD)

- name: Ensure base namespaces exist (Idempotent)
  kubernetes.core.k8s:
    name: "{{ item }}"
    api_version: v1
    kind: Namespace
    state: present
  loop:
    - ml-staging
    - ml-production
    - monitoring

- name: Create basic NetworkPolicy to deny all cross-namespace traffic by default (Zero Trust)
  kubernetes.core.k8s:
    state: present
    namespace: "{{ item }}"
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-all
      spec:
        podSelector: {} # Applique à tous les pods du namespace
        policyTypes:
        - Ingress
        - Egress
  loop:
    - ml-staging
    - ml-production
