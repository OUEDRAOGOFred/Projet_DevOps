sonar.projectKey=ml-api
sonar.projectName=Machine Learning API (Node.js)
sonar.projectVersion=1.0

# Spécification des sources et des dossiers à exclure
sonar.sources=src
sonar.exclusions=node_modules/**,tests/**

# Spécification des dossiers de tests
sonar.tests=tests

# Configuration de l'analyse JavaScript/Node.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=node_modules/**,tests/**,src/main.js

# Définition de la qualité stricte (Security Rating A, Reliability Rating A, etc.)
sonar.qualitygate.wait=true
